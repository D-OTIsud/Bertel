name: SQL fresh-apply gate

# Proves that a BLANK database built from the canonical manifest
# (docs/SQL_ROLLOUT_RUNBOOK.md → "Fresh Database — Complete Ordered Manifest")
# applies cleanly, in order, with no error. This enforces the
# "Deploy integrity (no PROD-only DDL)" invariant in CLAUDE.md: if a future
# migration is applied only to live PROD and never folded into the manifest,
# a fresh apply diverges and this gate goes red.
#
# Environment: the SQL files target Supabase (auth/storage schemas, auth.uid(),
# roles anon/authenticated/service_role), so the gate boots a real Supabase
# local database via the CLI rather than a bare Postgres container.

on:
  push:
    paths:
      - 'Base de donnée DLL et API/**.sql'
      - 'supabase/config.toml'
      - '.github/workflows/sql-fresh-apply.yml'
  pull_request:
    paths:
      - 'Base de donnée DLL et API/**.sql'
      - '.github/workflows/sql-fresh-apply.yml'
  workflow_dispatch:

jobs:
  fresh-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Ensure psql is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Start Supabase local database
        # Boots the Supabase-flavoured Postgres (DB image provides the auth/storage
        # schemas, the anon/authenticated/service_role roles, and the extensions the
        # manifest depends on). config.toml pins major_version 17 to match PROD.
        run: supabase start

      - name: Apply the canonical fresh-install manifest (aborts on first error)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/ci_fresh_apply.sql"

      - name: Smoke — assert the manifest produced the expected schema
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          psql "$DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            ASSERT (SELECT count(*) FROM information_schema.columns WHERE table_name='tag_link' AND column_name='position') = 1,
              'tag_link.position missing (migration_tag_link_position.sql not applied)';
            ASSERT (SELECT count(*) FROM information_schema.columns WHERE table_name='object_room_type' AND column_name='room_type_id') = 1,
              'object_room_type.room_type_id missing (migration_room_type_ref.sql not applied)';
            ASSERT (SELECT count(*) FROM information_schema.tables WHERE table_name='ref_sustainability_action_group') = 1,
              'ref_sustainability_action_group missing (migration_sustainability_v5.sql not applied)';
            ASSERT (SELECT count(*) FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
                    WHERE n.nspname='api' AND p.proname='save_object_workspace_tags') = 1,
              'api.save_object_workspace_tags missing (object_workspace_gap_rpcs.sql not applied)';
            ASSERT (SELECT count(*) FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
                    WHERE n.nspname='internal' AND p.proname='workspace_assert_can_write_object') = 1,
              'internal.workspace_assert_can_write_object missing (object_workspace_safe_write_rpcs.sql not applied)';
            ASSERT (SELECT count(*) FROM storage.buckets WHERE id='media') = 1,
              'media storage bucket missing (media_bucket.sql not applied)';
            ASSERT (SELECT relrowsecurity FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace
                    WHERE n.nspname='public' AND c.relname='object_act'),
              'object_act RLS not enabled (migration_object_act_rls.sql not applied)';
            ASSERT (SELECT count(*) FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace
                    WHERE n.nspname='public' AND c.relrowsecurity AND c.relname IN
                      ('ref_classification_equivalent_action','ref_classification_equivalent_group','ref_sustainability_action_group')) = 3,
              'ref_* cleanup RLS not enabled (migration_rls_ref_and_bak_cleanup.sql not applied)';
            RAISE NOTICE 'Smoke checks passed: manifest reproduced the expected schema.';
          END$$;
          SQL

      - name: SP-1 structural assertions (canonical-write authorization)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_sp1_canonical_write_auth.sql"

      - name: SP-1b coverage assertions (every editor-write table is canonical-covered)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_sp1b_canonical_coverage.sql"

      - name: SP-2 behavioral test (permission convention + status guard + team notes)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_sp2_permission_behavior.sql"

      - name: P0.3 coverage assertions (read-gate; no residual USING(true); nested FKs indexed)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_p03_read_gate_coverage.sql"

      - name: P0.3 behavioral test (anon/other-ORG cannot read draft child rows)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_p03_read_gate_behavior.sql"

      - name: object_act RLS test (anon reads published, not draft; anon cannot write)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_object_act_rls.sql"

      - name: SP-4 roster RPC test (rpc_list_org_members auth + shape)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_sp4_list_org_members.sql"

      - name: Object status lifecycle test (rpc_set_object_status + wrapper)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_object_status_lifecycle.sql"

      - name: ITI model test (duration_min + elevation_loss; get_object_resource shape; hour→minute filter)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_iti_model.sql"

      - name: Read-gate set-based test (object policy via current_user_extended_object_ids; draft ownership)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_read_gate_setbased.sql"

      - name: Cards-batch authorize test (DEFINER self-authorizes p_ids; no cross-persona draft leak)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_cards_batch_authorize.sql"

      - name: Cards published fast-path test (split gate skips extended scan for all-published; no leak)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_cards_published_fastpath.sql"

      - name: RLS auth-initplan sweep test (object-family policies wrapped; owner/stranger UPDATE gating intact)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_rls_initplan_sweep.sql"

      - name: Open-status timezone test (get_local_now_for_timezone no longer scans pg_timezone_names; fallback contract preserved)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_open_status_timezone.sql"

      - name: ref_commune test (24-commune seed + RLS pub-read/admin-write + object_zone FK)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_ref_commune.sql"

      - name: facet applicability registry test (§46 — registry + triggers + violations fn)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_facet_applicability.sql"

      - name: capacity applicability seed test (§46 companion — ref_capacity_applicability populated)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_capacity_applicability_seed.sql"

      - name: object_fma RLS test (§47 8n — per-command canonical write triple + owner/stranger/anon gating)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_object_fma_rls.sql"

      - name: write-policy per-command test (§47 8o — per-command coverage + owner/stranger/anon probe)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_write_policy_percommand.sql"

      - name: actor links editor test (§48 8r — per-command actor_object_role + actors branch + search_actors)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_actor_links_editor.sql"

      - name: contact_channel read gate test (§49 8s — anon draft-contact leak closed, extended arm intact)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_contact_channel_read_gate.sql"

      - name: media + object_description read gate test (§51 8t — anon draft media/description leak closed, place leg + extended arm intact)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_media_description_read_gate.sql"

      - name: object type SPU test (§53 8u — enum value + taxonomy_spu tree + SPU insert passes facet guard)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_object_type_spu.sql"

      - name: room-type trio read gate test (§54 8v — anon draft room-type leak closed, link ext arm + repaired link writes)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_room_type_read_gate.sql"

      - name: object_review read gate test (§56 8w — anon draft review leak closed, extended arm added, admin writes intact)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_object_review_read_gate.sql"

      - name: object type PRD + taxonomy seeds test (§57 8x/8y — enum, taxonomy_prd tree, 8 seeded domains, SPU/COM/LOI extensions, MICE applicability)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_object_type_prd.sql"

      - name: media visibility gate test (§59 14a — anon private/partners leak closed, cover cache gated, extended arm intact)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_media_visibility_gate.sql"

      - name: ranked label search test (label_scheme_ranked + label_match — exact rank 0 before evidence rank 1; T&H amenity vs sustainability equivalence kept separate)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_ranked_label_search.sql"

      - name: CRM module test (§61 8z — vocab merge + crm_sentiment, actor/object anchor CHECK, publisher read/write scopes + cross-ORG denial)
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f "Base de donnée DLL et API/tests/test_crm_module.sql"

      - name: Stop Supabase
        if: always()
        run: supabase stop
