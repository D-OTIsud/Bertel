version: "3.9"

services:
  bertel-tourism-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_ENABLE_DEMO_MODE: ${NEXT_PUBLIC_ENABLE_DEMO_MODE:-true}
      NEXT_PUBLIC_MAP_STYLE_CLASSIC: ${NEXT_PUBLIC_MAP_STYLE_CLASSIC:-https://demotiles.maplibre.org/style.json}
      NEXT_PUBLIC_MAP_STYLE_SATELLITE: ${NEXT_PUBLIC_MAP_STYLE_SATELLITE:-https://tiles.openfreemap.org/styles/liberty}
      NEXT_PUBLIC_MAP_STYLE_TOPO: ${NEXT_PUBLIC_MAP_STYLE_TOPO:-https://tiles.openfreemap.org/styles/bright}
      # Server-only secret (service-role / sb_secret_*): runtime env ONLY — never a
      # build ARG, which would bake the secret into the image layers.
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    # No persistent volumes - Next.js app is stateless, data lives in Supabase

volumes: {}
