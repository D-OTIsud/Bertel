version: "3.9"

services:
  bertel-tourism-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      VITE_ENABLE_DEMO_MODE: ${VITE_ENABLE_DEMO_MODE:-false}
      VITE_MAP_STYLE_CLASSIC: ${VITE_MAP_STYLE_CLASSIC:-https://demotiles.maplibre.org/style.json}
      VITE_MAP_STYLE_SATELLITE: ${VITE_MAP_STYLE_SATELLITE:-https://tiles.openfreemap.org/styles/liberty}
      VITE_MAP_STYLE_TOPO: ${VITE_MAP_STYLE_TOPO:-https://tiles.openfreemap.org/styles/bright}