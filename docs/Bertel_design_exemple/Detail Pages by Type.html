<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bertel · Detail pages by type</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="opening-periods.css"/>
<link rel="stylesheet" href="detail-types.css"/>
<style>
  /* The canvas itself uses warm-gray grid bg; our app bg gradients leak
     through body. Make body transparent so the canvas bg shows clean. */
  body { background: transparent; }
  html, body { height: auto; min-height: 100%; }
  #root { height: auto; min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="opening-periods.jsx"></script>
<script type="text/babel" src="detail-types.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
/* global React, ReactDOM, DesignCanvas, DCSection, DCArtboard, TypeDetailPage, TYPE_DEFS */

function Frame({ type }) {
  return (
    <div style={{ width: '100%', height: '100%', overflow: 'hidden' }}>
      <TypeDetailPage typeCode={type}/>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="Bertel · Fiche détail par type d'objet"
      subtitle="6 archétypes couvrant les 16 codes — KPIs, héros, sections et panneau latéral adaptés"
    >
      <DCSection
        id="lodging"
        title="Hébergement (HOT · HLO · HPA · CAMP · RVA)"
        subtitle="Galerie + chambres + équipements + salles séminaire — accent teal">
        <DCArtboard id="heb" label="Hébergement · Domaine du Bel Air"
                    width={1180} height={1620}>
          <Frame type="HEB"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="restaurant"
        title="Restaurant (RES)"
        subtitle="Cartes & menus PDF + grille horaires par service — accent orange">
        <DCArtboard id="res" label="Restaurant · Le Manapany"
                    width={1180} height={1620}>
          <Frame type="RES"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="activity"
        title="Activité (ASC)"
        subtitle="Formules / sessions + matériel + saison — accent bleu profond">
        <DCArtboard id="asc" label="Activité · Surf School Saint-Pierre"
                    width={1180} height={1620}>
          <Frame type="ASC"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="itinerary"
        title="Itinéraire (ITI · FMA) — hero map-first"
        subtitle="Carte + profil altimétrique + étapes + téléchargements GPX — accent vert">
        <DCArtboard id="iti" label="Itinéraire · Sentier des Trois Bassins"
                    width={1180} height={1860}>
          <Frame type="ITI"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="visit"
        title="Site & visite (LOI · PCU · PNA)"
        subtitle="Visites & médiation + horaires saisonniers + tarifs — accent prune">
        <DCArtboard id="vis" label="Patrimoine · Notre-Dame des Neiges"
                    width={1180} height={1620}>
          <Frame type="VIS"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="service"
        title="Service & commerce (PSV · SRV · COM · VIL)"
        subtitle="Prestations + zone d'intervention + grille horaires saison — accent rouille">
        <DCArtboard id="srv" label="Service · OT du Sud — Saint-Pierre"
                    width={1180} height={1620}>
          <Frame type="SRV"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
