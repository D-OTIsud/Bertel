<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bertel · Edit pages by type</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="detail-types.css"/>
<link rel="stylesheet" href="edit-types.css"/>
<style>
  body { background: transparent; }
  html, body { height: auto; min-height: 100%; }
  #root { height: auto; min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="opening-periods.jsx"></script>
<script type="text/babel" src="detail-types.jsx"></script>
<script type="text/babel" src="edit-enhancements.jsx"></script>
<script type="text/babel" src="edit-primitives.jsx"></script>
<script type="text/babel" src="edit-extensions.jsx"></script>
<script type="text/babel" src="edit-classification.jsx"></script>
<script type="text/babel" src="edit-type-blocks.jsx"></script>
<script type="text/babel" src="edit-types.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
/* global React, ReactDOM, DesignCanvas, DCSection, DCArtboard, EditPage */

function Frame({ type }) {
  return (
    <div data-screen-label={`Edit · ${type}`} style={{ width: '100%', height: '100%', overflow: 'hidden' }}>
      <EditPage typeCode={type}/>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="Bertel · Édition par type d'objet"
      subtitle="6 éditeurs spécialisés — chaque archétype expose tous les champs Berta 2.0 stockables côté base, avec une section 05 dédiée à son métier"
    >
      <DCSection
        id="lodging"
        title="Hébergement (HOT · HLO · HPA · CAMP · RVA)"
        subtitle="Chambres / unités locatives, équipements catégorisés, salles séminaire, politiques d'accueil">
        <DCArtboard id="edit-heb" label="Édition · Domaine du Bel Air (HOT)"
                    width={1340} height={5400}>
          <Frame type="HEB"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="restaurant"
        title="Restaurant (RES)"
        subtitle="Cuisines, spécialités, couverts & ticket moyen, cartes PDF, horaires midi/soir">
        <DCArtboard id="edit-res" label="Édition · Le Manapany (RES)"
                    width={1340} height={5400}>
          <Frame type="RES"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="activity"
        title="Activité (ASC)"
        subtitle="Sous-type (taxonomy_act), formules / sessions, public, équipement, fenêtre saisonnière">
        <DCArtboard id="edit-asc" label="Édition · Surf School Saint-Pierre (ASC)"
                    width={1340} height={5500}>
          <Frame type="ASC"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="itinerary"
        title="Itinéraire (ITI · FMA)"
        subtitle="Import GPX, KPI distance/dénivelé/durée, type de boucle, balisage, étapes & POI, praticabilité saisonnière">
        <DCArtboard id="edit-iti" label="Édition · Sentier des Trois Bassins (ITI)"
                    width={1340} height={5600}>
          <Frame type="ITI"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="visit"
        title="Site & visite (LOI · PCU · PNA)"
        subtitle="Sous-type, période historique, modes de visite, tarifs, horaires basse/haute saison, accessibilité">
        <DCArtboard id="edit-vis" label="Édition · Notre-Dame des Neiges (PCU)"
                    width={1340} height={5600}>
          <Frame type="VIS"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="service"
        title="Service & commerce (PSV · SRV · COM · VIL)"
        subtitle="Prestations délivrées, zone d'intervention multi-communes, langues comptoir, horaires saisonniers">
        <DCArtboard id="edit-srv" label="Édition · OT du Sud — Saint-Pierre (PSV)"
                    width={1340} height={5400}>
          <Frame type="SRV"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
