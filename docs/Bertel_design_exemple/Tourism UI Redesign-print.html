<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bertel · Tourism UI — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="opening-periods.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ============================================================
   Screen preview — page-like blocks stacked vertically
   ============================================================ */
html, body {
  height: auto;
  overflow: visible;
  background: #d6cdbf;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 32px 0;
}
#root {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
.print-page {
  width: 1600px;
  height: 1000px;
  background: var(--bg);
  box-shadow: 0 16px 40px rgba(24,49,59,0.2);
  position: relative;
  overflow: hidden;
}

/* The .app must fill the print-page, not 100vh */
.print-page .app {
  height: 100% !important;
}
.print-page .work, .print-page .explorer {
  height: 100%;
}

/* In the drawer pages, the drawer should fill the print page rather than
   floating as a modal. */
.print-page--drawer {
  background: rgba(24, 49, 59, 0.32); /* mimic scrim */
}
.print-page--drawer .drawer {
  position: absolute !important;
  inset: 24px !important;
  width: auto !important;
  height: auto !important;
  animation: none !important;
}
.print-page--drawer .scrim { display: none !important; }

/* Page label outside the frame */
.print-page-tag {
  position: absolute;
  top: -24px;
  left: 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: rgba(24,49,59,0.6);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ============================================================
   Print media — one logical page per .print-page
   ============================================================ */
@media print {
  @page {
    size: 16in 10in;
    margin: 0;
  }
  html, body {
    background: white !important;
    margin: 0 !important;
    padding: 0 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  body { display: block !important; gap: 0 !important; padding: 0 !important; }
  #root { display: block !important; gap: 0 !important; }
  .print-page {
    width: 16in !important;
    height: 10in !important;
    box-shadow: none !important;
    margin: 0 !important;
    page-break-after: always;
    break-after: page;
    overflow: hidden !important;
  }
  .print-page:last-child {
    page-break-after: auto;
    break-after: auto;
  }
  .print-page-tag { display: none !important; }
}

/* ============================================================
   Component overrides — open detail by default, suppress
   transitions/animations for accurate snapshot
   ============================================================ */
.print-page .drawer { animation: none !important; }
.print-page .scrim { animation: none !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="explorer.jsx"></script>
<script type="text/babel" src="drawers.jsx"></script>
<script type="text/babel" src="opening-periods.jsx"></script>
<script type="text/babel" src="print-app.jsx"></script>

<script>
// Auto-print once fonts + JSX have settled
(async () => {
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
  } catch (e) {}
  // Wait for the React tree to render
  const waitForRoot = () => new Promise(res => {
    const tick = () => {
      const r = document.getElementById('root');
      if (r && r.children.length >= 3) return res();
      requestAnimationFrame(tick);
    };
    tick();
  });
  await waitForRoot();
  await new Promise(r => setTimeout(r, 600));
  window.print();
})();
</script>
</body>
</html>
