services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      - SUPABASE_URL=${SUPABASE_URL:?}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?}
      - API_BEARER_TOKEN=${API_BEARER_TOKEN:?}
      - API_OPERATOR_TOKEN=${API_OPERATOR_TOKEN:-}
      - API_REVIEWER_TOKEN=${API_REVIEWER_TOKEN:-}
      - API_ADMIN_TOKEN=${API_ADMIN_TOKEN:-}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-}
      - RAW_IMPORT_BUCKET=${RAW_IMPORT_BUCKET:-raw_imports}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - INGEST_SAMPLE_ROWS=${INGEST_SAMPLE_ROWS:-5}
      - CLEANER_BATCH_SIZE=${CLEANER_BATCH_SIZE:-50}
      - ETL_CHUNK_SIZE=${ETL_CHUNK_SIZE:-500}
      - ETL_MAX_ATTEMPTS=${ETL_MAX_ATTEMPTS:-3}
      - ETL_RETRY_BACKOFF_SECONDS=${ETL_RETRY_BACKOFF_SECONDS:-2}
      - INGEST_MAX_BYTES=${INGEST_MAX_BYTES:-25000000}
      - INGEST_LIST_DEFAULT_LIMIT=${INGEST_LIST_DEFAULT_LIMIT:-50}
      - INGEST_LIST_MAX_LIMIT=${INGEST_LIST_MAX_LIMIT:-200}
      - MEDIA_BUCKET=${MEDIA_BUCKET:-media}
      - MEDIA_DOWNLOAD_TIMEOUT_SECONDS=${MEDIA_DOWNLOAD_TIMEOUT_SECONDS:-20}
      - MEDIA_MAX_BYTES=${MEDIA_MAX_BYTES:-15000000}
      - MEDIA_ALLOWED_DOMAINS=${MEDIA_ALLOWED_DOMAINS:-}
      - MEDIA_CONFIDENCE_AUTO=${MEDIA_CONFIDENCE_AUTO:-0.9}
      - MEDIA_CONFIDENCE_REVIEW=${MEDIA_CONFIDENCE_REVIEW:-0.6}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
      - API_BEARER_TOKEN=${API_BEARER_TOKEN:?}
      - SUPABASE_URL=${SUPABASE_URL:?}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?}
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
